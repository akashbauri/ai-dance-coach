<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>

<body onload="login()">

<h1>💎 AI Dance Coach PRO</h1>

<div class="top-bar">
<input type="file" id="uploadVideo">
<button onclick="startTraining()">🚀 Start</button>
<button onclick="finishSession()">Finish</button>
<button onclick="downloadReport()">Download</button>
</div>

<div class="container">

<div class="card">
<h2>Teacher</h2>
<video id="teacherVideo" controls width="320"></video>
</div>

<div class="card">
<h2>Live AI</h2>
<video class="input_video" style="display:none"></video>
<canvas class="output_canvas" width="640" height="480"></canvas>
</div>

</div>

<!-- Dashboard -->
<div class="dashboard">

<div class="metric">
<h3>Accuracy</h3>
<div id="accuracy">0%</div>
</div>

<div class="metric">
<h3>Error</h3>
<div id="error">0</div>
</div>

<div class="metric">
<h3>Feedback</h3>
<div id="feedback">Start training</div>
</div>

<div class="metric">
<h3>Latency</h3>
<div id="latency">0</div>
</div>

</div>

<!-- Graph -->
<canvas id="chart" width="600" height="200"></canvas>

<script src="script.js"></script>
</body>
</html>
