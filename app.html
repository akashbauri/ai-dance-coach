<!DOCTYPE html>
<html>
<head>
<title>AI Dance Training</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>AI Dance Training</h1>

<input type="file" id="uploadVideo">

<div class="container">

<!-- TEACHER -->
<div class="card">
<h3>Teacher</h3>
<video id="teacherVideo" controls></video>
</div>

<!-- USER -->
<div class="card">
<h3>You</h3>

<!-- IMPORTANT: visible video -->
<video class="input_video" autoplay muted playsinline></video>

<!-- overlay canvas -->
<canvas class="output_canvas"></canvas>

</div>

</div>

<div class="dashboard">

<div class="metrics">
<div class="metric"><h2 id="accuracy">0%</h2><p>Accuracy</p></div>
<div class="metric"><h2 id="error">0</h2><p>Error</p></div>
<div class="metric"><h2 id="latency">0ms</h2><p>Latency</p></div>
</div>

<div class="progress">
<div id="gauge-fill" class="progress-bar"></div>
</div>

<h3 id="feedback">Start dancing...</h3>

<button onclick="startTraining()" class="btn primary">🚀 Start</button>
<button onclick="finishSession()" class="btn secondary">📄 Finish</button>
<button onclick="downloadReport()" class="btn google">⬇ Download</button>

</div>

<script src="script.js"></script>
</body>
</html>
