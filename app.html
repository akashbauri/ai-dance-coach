<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Dance Coach</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    body {
      background: #0b132b;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    .video-box {
      position: relative;
      width: 400px;
      height: 300px;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    video {
      object-fit: cover;
      z-index: 1;
    }

    canvas {
      z-index: 2;
    }

    .stats {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>AI Dance Training</h1>

<div class="container">

  <!-- Teacher -->
  <div class="video-box">
    <video id="teacherVideo" src="demo.mp4" autoplay loop muted></video>
  </div>

  <!-- User -->
  <div class="video-box">
    <video id="userVideo" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

</div>

<div class="stats">
  <h2 id="accuracy">Accuracy: 0%</h2>
</div>

<script src="app.js"></script>

</body>
</html>
