<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Welcome Back</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <button id="googleBtn">Sign in with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="controls">
<input type="file" id="uploadVideo" accept="video/*">
<button id="startBtn">Start</button>
<button id="finishBtn">Finish</button>
<button id="pdfBtn">Download PDF</button>
</div>

<div class="grid">
  <div>
    <h3>Teacher</h3>
    <video id="teacherVideo" controls></video>
  </div>

  <div>
    <h3>You</h3>
    <video class="input_video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
</div>

<h2>Score: <span id="score">0</span></h2>
<h3 id="feedback"></h3>

<canvas id="chart"></canvas>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
