<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<!-- Firebase (IMPORTANT ORDER) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Login / Sign Up</h2>

  <input type="email" id="email" placeholder="Enter Email"><br><br>
  <input type="password" id="password" placeholder="Enter Password"><br><br>

  <button onclick="login()">Login / Signup</button><br><br>
  <button onclick="googleLogin()">🔵 Sign in with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h3>Upload Teacher Video (Max 30MB)</h3>
<input type="file" id="uploadVideo">

<br><br>
<button onclick="startTraining()">▶ Start Training</button>
<button onclick="finishSession()">✅ Finish</button>
<button onclick="downloadReport()">📄 Download Report</button>

<div class="container">

<video id="teacherVideo" width="300" controls></video>

<video class="input_video" style="display:none"></video>
<canvas class="output_canvas" width="640" height="480"></canvas>

</div>

<h3>Accuracy: <span id="accuracy">0</span>%</h3>
<h3>Error: <span id="error">0</span></h3>
<h3>Feedback: <span id="feedback"></span></h3>

<div id="leaderboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
