<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
    </style>
</head>
<body class="text-white font-sans min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
        <div class="glass p-12 rounded-3xl text-center shadow-2xl max-w-md w-full mx-4 border-purple-500/20">
            <h1 class="text-4xl font-black mb-4 tracking-tighter bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI DANCE COACH</h1>
            <p class="text-slate-400 mb-8 font-medium">Professional AI feedback for your dance journey.</p>
            <button id="login-btn" class="w-full bg-white text-slate-950 font-black py-4 rounded-xl hover:bg-blue-500 hover:text-white transition-all transform active:scale-95 shadow-xl">
                SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex flex-col p-6 overflow-hidden">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <span class="text-2xl">⚡</span>
                <h2 class="text-2xl font-black italic tracking-tighter text-blue-400">DANCE COACH PRO</h2>
            </div>
            <div class="flex items-center gap-4">
                <button id="download-btn" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-sm font-bold border border-slate-700 transition">📥 Download Result</button>
                <div id="user-display" class="bg-blue-900/20 px-4 py-2 rounded-xl text-sm border border-blue-500/30 font-medium text-blue-300"></div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 pb-6 overflow-hidden">
            <div class="relative rounded-3xl overflow-hidden bg-black border border-slate-800 group shadow-2xl">
                <video id="teacher-video" class="w-full h-full object-cover" loop muted controls></video>
                <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity">
                    <label for="video-upload" class="cursor-pointer bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-xl hover:bg-blue-500 transition">
                        📁 UPLOAD DANCE VIDEO
                    </label>
                    <input type="file" id="video-upload" accept="video/*" class="hidden">
                </div>
                <div class="absolute top-4 left-4 bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest">Teacher Video</div>
            </div>

            <div class="relative rounded-3xl overflow-hidden bg-black border border-slate-800 shadow-2xl">
                <video id="user-video" class="w-full h-full object-cover grayscale-[30%]"></video>
                <canvas id="canvas-overlay"></canvas>
                <div class="absolute top-4 left-4 bg-purple-600 px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest">Live Performance</div>
                
                <div class="absolute bottom-6 right-6 glass p-6 rounded-2xl w-64 border border-white/5 shadow-2xl">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-[10px] font-bold text-slate-500 tracking-widest">ACCURACY</span>
                        <span id="accuracy-score" class="text-4xl font-black text-emerald-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="score-bar" class="bg-gradient-to-r from-emerald-500 to-cyan-400 h-full w-0 transition-all duration-300"></div>
                    </div>
                    <p id="feedback-txt" class="text-[10px] mt-3 text-center text-slate-400 italic uppercase tracking-tighter">Ready to Dance?</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
