<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Dance Coach PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="login-card">
        <h1>💎 AI DANCE COACH PRO</h1>
        <button id="signin-btn">Sign in with Google</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="top-bar">
        <input type="file" id="uploadVideo" accept="video/*">
        <button onclick="trainTeacher()">🚀 1. Train AI</button>
        <button id="startBtn" onclick="startDancing()" disabled>🔥 2. Start Sync</button>
        <button onclick="downloadReport()">📥 Download Result</button>
    </div>

    <div class="container">
        <div class="card">
            <h2>Teacher Guide</h2>
            <video id="teacherVideo" width="640" height="480"></video>
        </div>
        <div class="card">
            <h2>Your Performance</h2>
            <canvas class="output_canvas" width="640" height="480"></canvas>
            <video class="input_video" style="display:none"></video>
        </div>
    </div>

    <div class="dashboard">
        <div class="metric">
            <h3>Accuracy: <span id="accuracy">0%</span></h3>
            <div class="gauge"><div id="gauge-fill"></div></div>
        </div>
        <div class="metric"><h3>Feedback: <span id="feedback">Ready</span></h3></div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
