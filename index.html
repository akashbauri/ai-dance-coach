<!DOCTYPE html>
<html>
<head>
  <title>AI Dance Coach PRO</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase + App -->
  <script type="module" src="script.js"></script>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="googleBtn">Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <input type="file" id="videoUpload" accept="video/*">

  <div class="buttons">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Finish</button>
    <button id="downloadBtn">Download Report</button>
  </div>

  <div class="video-container">
    <div>
      <h3>Teacher</h3>
      <video id="teacherVideo" controls></video>
    </div>

    <div>
      <h3>You</h3>
      <video id="webcam" autoplay></video>
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <h2 id="scoreText">Score: 0</h2>

  <canvas id="chart"></canvas>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>

</div>

</body>
</html>
