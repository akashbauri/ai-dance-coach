<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- jsPDF (PDF) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<div id="loginBox" class="card">
  <h2>🔐 Login / Sign Up</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login / Signup</button>
  <button onclick="googleLogin()">🔵 Google Sign-In</button>
</div>

<div id="app" style="display:none;">

<div class="card">

<input type="file" id="uploadVideo">
<button onclick="startTraining()">▶ Start</button>
<button onclick="finishSession()">✅ Finish</button>
<button onclick="downloadPDF()">📄 Download PDF</button>

</div>

<div class="container">

<video id="teacherVideo" width="300" controls></video>
<video class="input_video" style="display:none"></video>
<canvas class="output_canvas" width="640" height="480"></canvas>

</div>

<div class="dashboard">

<div class="card">Accuracy: <span id="accuracy">0</span>%</div>
<div class="card">Error: <span id="error">0</span></div>
<div class="card">Feedback: <span id="feedback"></span></div>
<div class="card">Avg Score: <span id="avg">0</span>%</div>

</div>

<div id="leaderboard" class="card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
