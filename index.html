<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO | MVP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="login-card">
        <h1>💎 AI DANCE COACH PRO</h1>
        <p>Login to activate AI and Camera</p>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth('email')">Login with Email</button>
            <div class="divider"><span>OR</span></div>
            <button class="btn-google" onclick="handleAuth('google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_Icons_By_Google.png" width="20"> 
                Sign in with Google
            </button>
        </div>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="top-nav">
        <div class="upload-section">
            <label for="uploadVideo" class="custom-file-upload">📁 Select Teacher Video</label>
            <input type="file" id="uploadVideo" accept="video/*">
        </div>
        <button id="syncBtn" class="btn-sync" onclick="startDanceSync()" disabled>🚀 START SYNC</button>
        <button class="btn-report" onclick="generateFinalReport()">📥 DOWNLOAD RESULT</button>
    </div>

    <div class="studio-container">
        <div class="view-panel">
            <div class="label-tag">TEACHER GUIDE</div>
            <video id="teacherVideo" preload="auto"></video>
        </div>

        <div class="view-panel">
            <div class="label-tag">YOUR PERFORMANCE</div>
            <div class="hud-display">
                <div class="hud-item">ACCURACY: <span id="acc-val">0%</span></div>
                <div class="hud-item">ERROR: <span id="err-val">0.00</span></div>
                <div class="hud-status" id="feedback-tag">READY</div>
            </div>
            <canvas id="output_canvas"></canvas>
            <video id="webcam_video" style="display:none"></video>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
