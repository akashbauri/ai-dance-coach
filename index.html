<!DOCTYPE html>
<html>
<head>
    <title>AI Dance Coach PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <h1>💎 AI Dance Coach PRO</h1>

    <div class="top-bar">
        <input type="file" id="uploadVideo" accept="video/*">
        <button id="trainBtn" onclick="trainTeacher()">🧠 1. Train Teacher</button>
        <button id="startBtn" onclick="startTraining()" disabled>🚀 2. Start Dancing</button>
        <button onclick="downloadReport()">📥 Download Result</button>
    </div>

    <div class="container">
        <div class="card">
            <h2>Teacher Video</h2>
            <video id="teacherVideo" width="640" height="480" muted></video>
        </div>
        <div class="card">
            <h2>Live Training</h2>
            <canvas class="output_canvas" width="640" height="480"></canvas>
            <video class="input_video" style="display:none"></video>
        </div>
    </div>

    <div class="dashboard">
        <div class="metric">
            <h3>Accuracy</h3>
            <div class="gauge"><div id="gauge-fill"></div></div>
            <div id="accuracy">0%</div>
        </div>
        <div class="metric">
            <h3>Feedback</h3>
            <div id="feedback">Upload & Train first</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
