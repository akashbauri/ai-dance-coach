<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Google Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<input type="file" id="uploadVideo"><br>
<button onclick="startTraining()">Start</button>
<button onclick="finishSession()">Finish</button>
<button onclick="downloadPDF()">Download PDF</button>

<div style="display:flex">
  <video id="teacherVideo" width="300" controls></video>
  <video class="input_video" style="display:none"></video>
  <canvas id="canvas" width="640" height="480"></canvas>
</div>

<h3>Accuracy: <span id="accuracy">0</span></h3>
<h3>Error: <span id="error">0</span></h3>
<h3>Feedback: <span id="feedback"></span></h3>

<canvas id="chart"></canvas>

<div id="leaderboard"></div>

</div>

<script src="script.js"></script>

</body>
</html>
