<!DOCTYPE html>
<html>
<head>
  <title>AI Dance Coach PRO</title>
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<h1>💎 AI Dance Coach PRO</h1>

<!-- LOGIN -->
<div id="loginUI" class="card">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Google</button>
</div>

<!-- APP -->
<div id="appUI" style="display:none">

  <input type="file" id="videoUpload">

  <div class="controls">
    <button onclick="start()">Start</button>
    <button onclick="finish()">Finish</button>
    <button onclick="downloadReport()">Download</button>
  </div>

  <div class="grid">

    <div>
      <h3>Teacher</h3>
      <video id="teacherVideo" controls></video>
    </div>

    <div>
      <h3>You</h3>
      <div class="cam-box">
        <video id="webcam" autoplay></video>
        <canvas id="canvas"></canvas>
      </div>
    </div>

  </div>

  <h2 id="score">Accuracy: 0%</h2>
  <ul id="leaderboard"></ul>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
