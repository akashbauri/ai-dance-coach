<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90">
        <div class="glass p-10 rounded-3xl text-center shadow-2xl max-w-sm w-full border border-white/10">
            <h1 class="text-3xl font-black mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI DANCE COACH</h1>
            <p class="text-slate-400 mb-8 text-sm">Professional AI feedback for your journey.</p>
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex flex-col p-4">
        <header class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-black italic text-blue-400">DANCE COACH PRO</h2>
            <div class="flex items-center gap-3">
                <button id="download-btn" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold border border-slate-700">📥 Export Report</button>
                <div id="user-display" class="text-xs font-medium text-slate-300 bg-white/5 px-3 py-2 rounded-lg border border-white/10"></div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 overflow-hidden">
            <div class="relative rounded-2xl overflow-hidden bg-black border border-white/5 group">
                <video id="teacher-video" class="w-full h-full object-cover" loop muted controls></video>
                <div class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity">
                    <label for="video-upload" class="cursor-pointer bg-white text-black px-6 py-2 rounded-full font-bold text-sm hover:scale-105 transition">📁 Upload Reference</label>
                    <input type="file" id="video-upload" accept="video/*" class="hidden">
                </div>
                <div class="absolute top-3 left-3 bg-blue-600 px-2 py-1 rounded text-[10px] font-bold uppercase">Teacher</div>
            </div>

            <div class="relative rounded-2xl overflow-hidden bg-black border border-white/5">
                <video id="user-video" class="w-full h-full object-cover"></video>
                <canvas id="canvas-overlay" class="absolute inset-0 w-full h-full"></canvas>
                <div class="absolute top-3 left-3 bg-purple-600 px-2 py-1 rounded text-[10px] font-bold uppercase">Live Performance</div>
                
                <div class="absolute bottom-4 right-4 glass p-4 rounded-xl w-48 border border-white/10">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-bold text-slate-400">ACCURACY</span>
                        <span id="accuracy-score" class="text-2xl font-black text-emerald-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="score-bar" class="bg-emerald-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                    <p id="feedback-txt" class="text-[9px] mt-2 text-center text-slate-400 italic">Positioning...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
