<!DOCTYPE html>
<html>
<head>
<title>AI Dance Coach PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="navbar">
  <h1>💎 AI Dance Coach PRO</h1>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card center">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login / Signup</button>
  <button onclick="googleLogin()">Google Sign-in</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="controls card">
<input type="file" id="uploadVideo">
<button onclick="startTraining()">Start</button>
<button onclick="finishSession()">Finish</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="main">

<div class="video-box card">
<h3>Teacher</h3>
<video id="teacherVideo" controls></video>
</div>

<div class="video-box card">
<h3>You</h3>
<video class="input_video" autoplay playsinline></video>
<canvas class="output_canvas"></canvas>
</div>

</div>

<div class="stats">

<div class="card">Accuracy: <span id="accuracy">0</span>%</div>
<div class="card">Error: <span id="error">0</span></div>
<div class="card">Feedback: <span id="feedback"></span></div>
<div class="card">Avg: <span id="avg">0</span>%</div>

</div>

<div id="leaderboard" class="card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
