<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dance Coach PRO</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="glass-card">
        <h1>💎 AI DANCE COACH <span class="pro-tag">PRO</span></h1>
        <p>Master your moves with real-time CV analysis.</p>
        <button id="login-btn" class="main-btn">Sign in with Google</button>
    </div>
</div>

<div class="app-container" style="display:none;" id="main-app">
    <header>
        <div class="logo">AI DANCE COACH <span class="pro-tag">PRO</span></div>
        <div id="user-info"></div>
    </header>

    <div class="workspace">
        <div class="video-card">
            <div class="card-header">TEACHER GUIDE</div>
            <input type="file" id="uploadVideo" accept="video/*">
            <video id="teacherVideo" crossorigin="anonymous"></video>
        </div>

        <div class="video-card">
            <div class="card-header">LIVE TRAINING</div>
            <canvas id="output_canvas" width="640" height="480"></canvas>
            <video id="input_video" style="display:none"></video>
        </div>
    </div>

    <div class="dashboard-footer">
        <div class="metric">
            <span>ACCURACY</span>
            <div id="accuracy-val">0%</div>
        </div>
        <div class="metric">
            <span>FEEDBACK</span>
            <div id="feedback-text">READY</div>
        </div>
        <div class="controls">
            <button onclick="startSession()" class="action-btn">🚀 SYNC & START</button>
            <button onclick="generatePDF()" class="action-btn download">📥 REPORT</button>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
