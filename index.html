<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Dance Coach PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="glass-card login-box">
        <h1>💎 AI DANCE COACH PRO</h1>
        <p>Login to start your performance</p>
        <button id="login-btn" onclick="handleLogin()" class="btn-primary">Sign in with Google</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <header class="app-header">
        <div class="brand">💎 AI DANCE COACH PRO</div>
    </header>

    <div class="video-container">
        <div class="video-box">
            <span>TEACHER GUIDE</span>
            <input type="file" id="uploadVideo" accept="video/*">
            <video id="teacherVideo"></video>
        </div>
        <div class="video-box">
            <span>YOUR PERFORMANCE</span>
            <canvas id="output_canvas" width="640" height="480"></canvas>
            <video id="input_video" style="display:none"></video>
        </div>
    </div>

    <div class="controls">
        <div class="stats">
            ACCURACY: <span id="accuracy">0%</span>
            <div class="bar"><div id="gauge-fill"></div></div>
        </div>
        <div class="btns">
            <button onclick="trainTeacher()" class="btn-secondary">🧠 1. TRAIN AI</button>
            <button id="startBtn" onclick="startDancing()" class="btn-primary" disabled>🚀 2. START SYNC</button>
            <button onclick="downloadReport()" class="btn-download">📥 DOWNLOAD RESULT</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
